plugins {
    id 'java'
    id 'io.qameta.allure' version "3.0.2"

}

allure {
    report {
        version.set('2.33.0')
    }
    adapter {
        aspectjWeaver.set(true)
        frameworks {
            junit5 {
                adapterVersion.set('2.33.0')
            }
        }
    }
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation("io.qameta.allure:allure-junit5:2.33.0")
    testImplementation("io.qameta.allure:allure-selenide:2.33.0")
    testImplementation("org.junit.jupiter:junit-jupiter:5.11.4")
    testImplementation("com.codeborne:selenide:7.13.0")
}

test {
    useJUnitPlatform()
}